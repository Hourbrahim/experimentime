<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opimg</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: flex;
  height: 100vh;
  overflow: hidden;
  font-family: 'Space Mono', monospace;
  background: #0a0a0a;
  color: #e0e0e0;
}

#canvas-container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
  position: relative;
  overflow: hidden;
}

#canvas-container canvas { display: block; }

#drop-zone {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: #666;
  font-size: 13px;
  pointer-events: none;
  z-index: 5;
  transition: opacity 0.3s;
}
#drop-zone.hidden { opacity: 0; pointer-events: none; }
#drop-zone .arrow { font-size: 28px; opacity: 0.4; }

.drag-over #drop-zone {
  opacity: 1;
  background: rgba(255,255,255,0.03);
  border: 2px dashed #444;
}

#controls {
  width: 260px;
  min-width: 260px;
  height: 100vh;
  overflow-y: auto;
  padding: 16px 14px;
  background: #111;
  border-left: 1px solid #222;
  display: flex;
  flex-direction: column;
  gap: 6px;
  scrollbar-width: thin;
  scrollbar-color: #333 transparent;
}
#controls::-webkit-scrollbar { width: 4px; }
#controls::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

.tool-title {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 4px;
  color: #fff;
}
.tool-sub {
  font-size: 9px;
  color: #555;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.section-label {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #555;
  margin-top: 12px;
  margin-bottom: 2px;
}

.control-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 2px;
}
.control-row label {
  font-size: 10px;
  color: #999;
  flex-shrink: 0;
  min-width: 70px;
}
.control-row .val {
  font-size: 10px;
  color: #666;
  min-width: 28px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  flex: 1;
  height: 3px;
  background: #333;
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #fff;
  cursor: pointer;
  transition: transform 0.1s;
}
input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
input[type="range"]::-moz-range-thumb {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #fff;
  border: none;
  cursor: pointer;
}

input[type="text"] {
  background: #1a1a1a;
  border: 1px solid #333;
  border-radius: 6px;
  color: #fff;
  font-family: 'Space Mono', monospace;
  font-size: 18px;
  text-align: center;
  padding: 6px 8px;
  width: 100%;
  outline: none;
  transition: border-color 0.15s;
}
input[type="text"]:focus { border-color: #666; }

input[type="color"] {
  width: 32px;
  height: 32px;
  border: 2px solid #333;
  border-radius: 50%;
  cursor: pointer;
  background: none;
  padding: 0;
}
input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
input[type="color"]::-webkit-color-swatch { border-radius: 50%; border: none; }
input[type="color"]::-moz-color-swatch { border-radius: 50%; border: none; }

.color-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 2px;
}
.color-row label {
  font-size: 10px;
  color: #999;
}

button {
  padding: 8px 0;
  width: 100%;
  border: 1px solid #333;
  border-radius: 6px;
  background: #1a1a1a;
  color: #e0e0e0;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.5px;
}
button:hover { background: #222; border-color: #555; }

.btn-primary {
  background: #fff;
  color: #000;
  border-color: #fff;
  font-weight: 700;
}
.btn-primary:hover { background: #ddd; border-color: #ddd; }

.btn-row {
  display: flex;
  gap: 6px;
}
.btn-row button { flex: 1; }

.mode-toggle {
  display: flex;
  border: 1px solid #333;
  border-radius: 6px;
  overflow: hidden;
  flex-shrink: 0;
}
.mode-btn {
  border: none !important;
  border-radius: 0 !important;
  flex: 1;
  font-size: 10px;
  padding: 6px 0;
  min-height: 30px;
}
.mode-btn.active {
  background: #fff !important;
  color: #000 !important;
}
.mode-btn:not(.active) {
  background: #1a1a1a !important;
  color: #888 !important;
}

.divider {
  border: none;
  border-top: 1px solid #1e1e1e;
  margin: 6px 0;
}

.info-text {
  font-size: 9px;
  color: #444;
  line-height: 1.5;
  margin-top: 4px;
}
</style>
</head>
<body>

<div id="canvas-container">
  <div id="drop-zone">
    <div class="arrow">&darr;</div>
    <div>drop image or click upload</div>
  </div>
</div>

<div id="controls">
  <div class="tool-title">Opimg</div>
  <div class="tool-sub">op art image filter</div>

  <hr class="divider">

  <button class="btn-primary" id="btn-upload">Upload Image</button>
  <input type="file" id="file-input" accept="image/*" style="display:none">

  <hr class="divider">

  <div class="section-label">Render Mode</div>
  <div class="mode-toggle" id="mode-toggle">
    <button class="mode-btn active" data-mode="lines">Lines</button>
    <button class="mode-btn" data-mode="chars">Chars</button>
  </div>

  <div id="char-section" style="display:none;">
    <div class="section-label">Character</div>
    <input type="text" id="char-input" value="" maxlength="2" placeholder="type a character">
  </div>

  <hr class="divider">
  <div class="section-label">Grid</div>

  <div class="control-row">
    <label>Resolution</label>
    <input type="range" id="sl-res" min="10" max="200" value="80">
    <span class="val" id="val-res">80</span>
  </div>

  <div class="control-row">
    <label>Stroke</label>
    <input type="range" id="sl-stroke" min="1" max="40" value="16" step="1">
    <span class="val" id="val-stroke">1.6</span>
  </div>

  <hr class="divider">
  <div class="section-label">Image</div>

  <div class="control-row">
    <label>Threshold</label>
    <input type="range" id="sl-thresh" min="0" max="255" value="100">
    <span class="val" id="val-thresh">100</span>
  </div>

  <div class="control-row">
    <label>Brightness</label>
    <input type="range" id="sl-bright" min="-100" max="100" value="0">
    <span class="val" id="val-bright">0</span>
  </div>

  <div class="control-row">
    <label>Exposure</label>
    <input type="range" id="sl-exposure" min="1" max="30" value="10">
    <span class="val" id="val-exposure">1.0</span>
  </div>

  <div class="control-row">
    <label>Contrast</label>
    <input type="range" id="sl-contrast" min="1" max="30" value="10">
    <span class="val" id="val-contrast">1.0</span>
  </div>

  <div class="control-row">
    <label>Invert</label>
    <input type="range" id="sl-invert" min="0" max="1" value="0" step="1">
    <span class="val" id="val-invert">off</span>
  </div>

  <hr class="divider">
  <div class="section-label">Colors</div>

  <div class="color-row">
    <input type="color" id="col-stroke" value="#ffffff">
    <label>Stroke</label>
  </div>
  <div class="color-row">
    <input type="color" id="col-bg" value="#000000">
    <label>Background</label>
  </div>

  <div class="control-row">
    <label>Colorize</label>
    <input type="range" id="sl-colorize" min="0" max="1" value="0" step="1">
    <span class="val" id="val-colorize">off</span>
  </div>

  <hr class="divider">
  <div class="section-label">Export</div>

  <div class="btn-row">
    <button id="btn-save">Save PNG</button>
    <button id="btn-save-svg">Save SVG</button>
  </div>

  <hr class="divider">

  <button id="btn-reset">Reset</button>

  <hr class="divider">
  <div class="info-text">
    Drop an image or click upload. Adjust controls to shape the op art effect.
  </div>
</div>

<script>
let photo = null;
let photoLoaded = false;
let renderMode = 'lines';
let photoW = 0, photoH = 0;

// Default values for reset
const DEFAULTS = {
  res: 80, stroke: 16, thresh: 100, bright: 0,
  exposure: 10, contrast: 10, invert: 0, colorize: 0,
  colStroke: '#ffffff', colBg: '#000000'
};

function sl(id) { return parseInt(document.getElementById('sl-' + id).value); }
function slF(id) { return parseFloat(document.getElementById('sl-' + id).value); }

function updateVal(id) {
  const el = document.getElementById('sl-' + id);
  const valEl = document.getElementById('val-' + id);
  if (!el || !valEl) return;
  if (id === 'invert') { valEl.textContent = el.value === '1' ? 'on' : 'off'; }
  else if (id === 'colorize') { valEl.textContent = el.value === '1' ? 'on' : 'off'; }
  else if (id === 'exposure' || id === 'contrast') { valEl.textContent = (parseFloat(el.value) / 10).toFixed(1); }
  else if (id === 'stroke') { valEl.textContent = (parseFloat(el.value) / 10).toFixed(1); }
  else { valEl.textContent = el.value; }
}

// Wire up all sliders
document.querySelectorAll('input[type="range"]').forEach(s => {
  const id = s.id.replace('sl-', '');
  s.addEventListener('input', () => updateVal(id));
});

// File upload
const fileInput = document.getElementById('file-input');
document.getElementById('btn-upload').addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

// Drag & drop
const canvasContainer = document.getElementById('canvas-container');
canvasContainer.addEventListener('dragover', e => {
  e.preventDefault();
  canvasContainer.classList.add('drag-over');
});
canvasContainer.addEventListener('dragleave', () => canvasContainer.classList.remove('drag-over'));
canvasContainer.addEventListener('drop', e => {
  e.preventDefault();
  canvasContainer.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

function handleFile(file) {
  if (!file.type.startsWith('image/')) return;
  const url = URL.createObjectURL(file);
  loadImage(url, img => {
    photo = img;
    photoW = img.width;
    photoH = img.height;
    photoLoaded = true;
    document.getElementById('drop-zone').classList.add('hidden');
    URL.revokeObjectURL(url);
  });
}

// Compute render dimensions that fit the image ratio within available space
function getRenderDims() {
  if (!photoLoaded) return { rw: 0, rh: 0, ox: 0, oy: 0 };
  const aspect = photoW / photoH;
  let rw, rh;
  if (aspect >= 1) {
    rw = Math.min(width, width);
    rh = rw / aspect;
    if (rh > height) { rh = height; rw = rh * aspect; }
  } else {
    rh = Math.min(height, height);
    rw = rh * aspect;
    if (rw > width) { rw = width; rh = rw / aspect; }
  }
  const ox = (width - rw) / 2;
  const oy = (height - rh) / 2;
  return { rw, rh, ox, oy };
}

// Mode toggle
document.getElementById('mode-toggle').addEventListener('click', e => {
  const btn = e.target.closest('.mode-btn');
  if (!btn) return;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMode = btn.dataset.mode;
  document.getElementById('char-section').style.display = renderMode === 'chars' ? 'block' : 'none';
});

// Reset
document.getElementById('btn-reset').addEventListener('click', () => {
  document.getElementById('sl-res').value = DEFAULTS.res;
  document.getElementById('sl-stroke').value = DEFAULTS.stroke;
  document.getElementById('sl-thresh').value = DEFAULTS.thresh;
  document.getElementById('sl-bright').value = DEFAULTS.bright;
  document.getElementById('sl-exposure').value = DEFAULTS.exposure;
  document.getElementById('sl-contrast').value = DEFAULTS.contrast;
  document.getElementById('sl-invert').value = DEFAULTS.invert;
  document.getElementById('sl-colorize').value = DEFAULTS.colorize;
  document.getElementById('col-stroke').value = DEFAULTS.colStroke;
  document.getElementById('col-bg').value = DEFAULTS.colBg;
  document.getElementById('char-input').value = '';
  // Reset mode to lines
  renderMode = 'lines';
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.mode-btn[data-mode="lines"]').classList.add('active');
  document.getElementById('char-section').style.display = 'none';
  // Update all displays
  ['res','stroke','thresh','bright','exposure','contrast','invert','colorize'].forEach(updateVal);
});

// Save PNG — render to offscreen buffer at image dimensions
document.getElementById('btn-save').addEventListener('click', () => {
  if (!photoLoaded) return;
  const pg = renderToBuffer();
  pg.save('opimg.png');
});

// Save SVG
document.getElementById('btn-save-svg').addEventListener('click', () => {
  if (!photoLoaded) return;
  exportSVG();
});

// Render to an offscreen buffer at original image size
function renderToBuffer() {
  const res = sl('res');
  const aspect = photoW / photoH;
  // Use image dimensions for export
  const outW = photoW;
  const outH = photoH;
  const tileSizeX = outW / (aspect >= 1 ? res : Math.round(res * aspect));
  const tileSizeY = outH / (aspect >= 1 ? Math.round(res / aspect) : res);
  const tilesX = aspect >= 1 ? res : Math.round(res * aspect);
  const tilesY = aspect >= 1 ? Math.round(res / aspect) : res;
  const tileSize = Math.max(tileSizeX, tileSizeY);
  // Recalculate: use uniform tile size based on res
  const resX = Math.round(outW / tileSize) || 1;
  const resY = Math.round(outH / tileSize) || 1;
  const tsX = outW / resX;
  const tsY = outH / resY;

  const thresh = sl('thresh');
  const bAdj = sl('bright');
  const expo = slF('exposure') / 10;
  const cont = slF('contrast') / 10;
  const inv = sl('invert') === 1;
  const useColor = sl('colorize') === 1;
  const strokeCol = document.getElementById('col-stroke').value;
  const bgCol = document.getElementById('col-bg').value;
  const strokeW = slF('stroke') / 10;
  const chr = document.getElementById('char-input').value || '/';

  const pg = createGraphics(outW, outH);
  pg.background(bgCol);
  pg.textFont('monospace');
  pg.textAlign(CENTER, CENTER);

  const tmp = photo.get();
  tmp.resize(resX, resY);
  tmp.loadPixels();

  for (let x = 0; x < resX; x++) {
    for (let y = 0; y < resY; y++) {
      const idx = (y * resX + x) * 4;
      let r = tmp.pixels[idx], g = tmp.pixels[idx+1], b = tmp.pixels[idx+2];
      let br = 0.299 * r + 0.587 * g + 0.114 * b;
      br = Math.pow(br / 255, 1 / expo) * 255;
      br = ((br - 127.5) * cont) + 127.5 + bAdj;
      br = Math.max(0, Math.min(255, br));
      if (inv) br = 255 - br;

      const w = map(br, 0, 255, 0.1, strokeW * 1.5);

      if (useColor) {
        let cr = Math.pow(r / 255, 1 / expo) * 255;
        let cg = Math.pow(g / 255, 1 / expo) * 255;
        let cb = Math.pow(b / 255, 1 / expo) * 255;
        cr = constrain(cr + bAdj, 0, 255);
        cg = constrain(cg + bAdj, 0, 255);
        cb = constrain(cb + bAdj, 0, 255);
        pg.stroke(cr, cg, cb);
        pg.fill(cr, cg, cb);
      } else {
        const sc = color(strokeCol);
        const a = map(br, 0, 255, 30, 255);
        pg.stroke(red(sc), green(sc), blue(sc), a);
        pg.fill(red(sc), green(sc), blue(sc), a);
      }

      pg.strokeWeight(w);

      if (renderMode === 'lines') {
        if (br >= thresh) {
          pg.line((x+1)*tsX, y*tsY, x*tsX, (y+1)*tsY);
        } else {
          pg.line(x*tsX, y*tsY, (x+1)*tsX, (y+1)*tsY);
        }
      } else {
        pg.noStroke();
        const sz = map(br, 0, 255, 2, Math.min(tsX, tsY) * 1.1);
        pg.textSize(sz);
        pg.text(chr, x*tsX + tsX/2, y*tsY + tsY/2);
      }
    }
  }
  return pg;
}

// SVG export at image dimensions
function exportSVG() {
  const res = sl('res');
  const outW = photoW;
  const outH = photoH;
  const aspect = photoW / photoH;
  // Uniform tile size
  const tileBase = (aspect >= 1 ? outW : outH) / res;
  const resX = Math.round(outW / tileBase) || 1;
  const resY = Math.round(outH / tileBase) || 1;
  const tsX = outW / resX;
  const tsY = outH / resY;

  const thresh = sl('thresh');
  const bAdj = sl('bright');
  const expo = slF('exposure') / 10;
  const cont = slF('contrast') / 10;
  const inv = sl('invert') === 1;
  const useColor = sl('colorize') === 1;
  const strokeW = slF('stroke') / 10;
  const strokeCol = document.getElementById('col-stroke').value;
  const bgCol = document.getElementById('col-bg').value;
  const chr = document.getElementById('char-input').value || '/';

  const tmp = photo.get();
  tmp.resize(resX, resY);
  tmp.loadPixels();

  let lines = [];
  lines.push(`<svg xmlns="http://www.w3.org/2000/svg" width="${outW}" height="${outH}" viewBox="0 0 ${outW} ${outH}">`);
  lines.push(`<rect width="${outW}" height="${outH}" fill="${bgCol}"/>`);

  for (let x = 0; x < resX; x++) {
    for (let y = 0; y < resY; y++) {
      const idx = (y * resX + x) * 4;
      let r = tmp.pixels[idx], g = tmp.pixels[idx+1], b = tmp.pixels[idx+2];
      let br = 0.299 * r + 0.587 * g + 0.114 * b;
      br = Math.pow(br / 255, 1 / expo) * 255;
      br = ((br - 127.5) * cont) + 127.5 + bAdj;
      br = Math.max(0, Math.min(255, br));
      if (inv) br = 255 - br;

      const w = mapVal(br, 0, 255, 0.1, strokeW * 1.5);
      let col = strokeCol;
      if (useColor) {
        const rr = Math.min(255, Math.max(0, Math.pow(r/255, 1/expo)*255 + bAdj));
        const gg = Math.min(255, Math.max(0, Math.pow(g/255, 1/expo)*255 + bAdj));
        const bb = Math.min(255, Math.max(0, Math.pow(b/255, 1/expo)*255 + bAdj));
        col = `rgb(${Math.round(rr)},${Math.round(gg)},${Math.round(bb)})`;
      }

      if (renderMode === 'lines') {
        if (br >= thresh) {
          lines.push(`<line x1="${(x+1)*tsX}" y1="${y*tsY}" x2="${x*tsX}" y2="${(y+1)*tsY}" stroke="${col}" stroke-width="${w}" stroke-linecap="round"/>`);
        } else {
          lines.push(`<line x1="${x*tsX}" y1="${y*tsY}" x2="${(x+1)*tsX}" y2="${(y+1)*tsY}" stroke="${col}" stroke-width="${w}" stroke-linecap="round"/>`);
        }
      } else {
        const sz = mapVal(br, 0, 255, 2, Math.min(tsX, tsY) * 1.1);
        lines.push(`<text x="${x*tsX + tsX/2}" y="${y*tsY + tsY/2}" fill="${col}" font-size="${sz}" text-anchor="middle" dominant-baseline="central" font-family="monospace">${escapeXml(chr)}</text>`);
      }
    }
  }
  lines.push('</svg>');

  const blob = new Blob([lines.join('\n')], { type: 'image/svg+xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'opimg.svg';
  a.click();
  URL.revokeObjectURL(a.href);
}

function escapeXml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function mapVal(v, inMin, inMax, outMin, outMax) {
  return outMin + (v - inMin) * (outMax - outMin) / (inMax - inMin);
}

// p5.js sketch
function setup() {
  const container = document.getElementById('canvas-container');
  const cnv = createCanvas(container.offsetWidth, container.offsetHeight);
  cnv.parent('canvas-container');
  pixelDensity(1);
  textFont('monospace');
  textAlign(CENTER, CENTER);
}

function draw() {
  const bgCol = document.getElementById('col-bg').value;
  background(bgCol);

  if (!photoLoaded || !photo) return;

  const res = sl('res');
  const { rw, rh, ox, oy } = getRenderDims();
  if (rw <= 0 || rh <= 0) return;

  const aspect = photoW / photoH;
  // Uniform tile size based on the longer axis
  const tileBase = (aspect >= 1 ? rw : rh) / res;
  const resX = Math.max(1, Math.round(rw / tileBase));
  const resY = Math.max(1, Math.round(rh / tileBase));
  const tsX = rw / resX;
  const tsY = rh / resY;

  const thresh = sl('thresh');
  const bAdj = sl('bright');
  const expo = slF('exposure') / 10;
  const cont = slF('contrast') / 10;
  const inv = sl('invert') === 1;
  const useColor = sl('colorize') === 1;
  const strokeCol = document.getElementById('col-stroke').value;
  const strokeW = slF('stroke') / 10;
  const chr = document.getElementById('char-input').value || '/';

  const tmp = photo.get();
  tmp.resize(resX, resY);
  tmp.loadPixels();

  push();
  translate(ox, oy);

  for (let x = 0; x < resX; x++) {
    for (let y = 0; y < resY; y++) {
      const idx = (y * resX + x) * 4;
      let r = tmp.pixels[idx];
      let g = tmp.pixels[idx + 1];
      let b = tmp.pixels[idx + 2];

      let br = 0.299 * r + 0.587 * g + 0.114 * b;
      br = Math.pow(br / 255, 1 / expo) * 255;
      br = ((br - 127.5) * cont) + 127.5;
      br += bAdj;
      br = constrain(br, 0, 255);
      if (inv) br = 255 - br;

      const w = map(br, 0, 255, 0.1, strokeW * 1.5);

      if (useColor) {
        let cr = Math.pow(r / 255, 1 / expo) * 255;
        let cg = Math.pow(g / 255, 1 / expo) * 255;
        let cb = Math.pow(b / 255, 1 / expo) * 255;
        cr = constrain(cr + bAdj, 0, 255);
        cg = constrain(cg + bAdj, 0, 255);
        cb = constrain(cb + bAdj, 0, 255);
        stroke(cr, cg, cb);
        fill(cr, cg, cb);
      } else {
        const sc = color(strokeCol);
        const a = map(br, 0, 255, 30, 255);
        stroke(red(sc), green(sc), blue(sc), a);
        fill(red(sc), green(sc), blue(sc), a);
      }

      strokeWeight(w);

      if (renderMode === 'lines') {
        if (br >= thresh) {
          line((x + 1) * tsX, y * tsY, x * tsX, (y + 1) * tsY);
        } else {
          line(x * tsX, y * tsY, (x + 1) * tsX, (y + 1) * tsY);
        }
      } else {
        noStroke();
        const sz = map(br, 0, 255, 2, Math.min(tsX, tsY) * 1.1);
        textSize(sz);
        text(chr, x * tsX + tsX / 2, y * tsY + tsY / 2);
      }
    }
  }

  pop();
}

function windowResized() {
  const container = document.getElementById('canvas-container');
  resizeCanvas(container.offsetWidth, container.offsetHeight);
}
</script>
