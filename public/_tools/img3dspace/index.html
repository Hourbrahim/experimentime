<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D SPACE ANIMATOR | OVERHAUL</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@400;600&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/freshfork/p5.EasyCam@1.2.1/p5.easycam.min.js"></script>
</head>

<body class="minimal-bw">
    <main id="app-container">
        <aside id="sidebar">
            <header>
                <h1>ANIMATOR <span class="version">V2</span></h1>
                <p>MINIMALIST 3D SPACE EXPLORATION</p>
            </header>

            <section class="control-group">
                <h3>ASSETS</h3>
                <div class="upload-area" id="drop-zone">
                    <p>DRAG & DROP <span class="light">OR</span> <label for="file-input">BROWSE</label></p>
                    <input type="file" id="file-input" multiple accept="image/*" hidden>
                </div>
                <div class="control-item row">
                    <label>UNIQUE DISTR.</label>
                    <input type="checkbox" id="unique-toggle">
                </div>
            </section>

            <section class="control-group">
                <h3>FRAME</h3>
                <div class="control-item">
                    <label>OUTPUT RATIO</label>
                    <select id="canvas-ratio">
                        <option value="full">FULL SCREEN</option>
                        <option value="1:1">SQUARE (1:1)</option>
                        <option value="4:5">PORTRAIT (4:5)</option>
                        <option value="16:9">LANDSCAPE (16:9)</option>
                    </select>
                </div>
                <div class="control-item">
                    <label>STROKE LIMIT</label>
                    <input type="range" id="stroke-slider" min="0" max="1" step="0.01" value="0.2">
                </div>
            </section>

            <section class="control-group">
                <h3>MORPHOLOGY</h3>
                <div class="control-item">
                    <label>DISTORTION (WAVES)</label>
                    <input type="range" id="morph-slider" min="0" max="1" step="0.01" value="0.5">
                    <span id="morph-val">0.5</span>
                </div>
                <div class="control-item">
                    <label>SPEED</label>
                    <input type="range" id="speed-slider" min="0" max="2" step="0.01" value="0.5">
                    <span id="speed-val">0.5</span>
                </div>
                <div class="control-item">
                    <label>SCALE</label>
                    <input type="range" id="radius-slider" min="100" max="2000" value="1000">
                    <span id="radius-val">1000</span>
                </div>
            </section>

            <section class="control-group">
                <h3>WAVE CONTROLS</h3>
                <div class="control-item">
                    <label>FREQ X</label>
                    <input type="range" id="freq-x" min="0.1" max="10" step="0.1" value="1">
                </div>
                <div class="control-item">
                    <label>FREQ Y</label>
                    <input type="range" id="freq-y" min="0.1" max="10" step="0.1" value="1">
                </div>
                <div class="control-item">
                    <label>MOVEMENT</label>
                    <input type="range" id="wave-move" min="0" max="5" step="0.1" value="1">
                </div>
            </section>

            <section class="control-group export">
                <button id="record-btn" class="bw-btn">START RECORDING</button>
                <p id="record-status">READY TO EXPORT</p>
            </section>
        </aside>

        <div id="canvas-wrapper">
            <!-- Canvas will be injected here -->
        </div>
    </main>

    <script src="ui.js"></script>
    <script src="sketch.js"></script>
</body>

</html>
